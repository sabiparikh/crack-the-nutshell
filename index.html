<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crack the Nutshell</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
h1{margin-top:15px;font-size:42px}
#mission{margin:10px;font-size:18px}

.topBox{border:2px solid #fff;padding:15px;border-radius:10px;width:260px;margin:auto}
#timer{font-size:28px;margin-top:5px}

#target{
  font-size:95px;
  font-weight:bold;
  margin:25px 0;
  letter-spacing:3px;
}

.blocksWrapper{
  display:flex;
  justify-content:center;
  gap:120px;
  margin-top:10px;
}

.block{width:42px;height:42px;margin:5px;border-radius:6px;cursor:grab;display:inline-block}
.blue{background:#2b7cff}
.yellow{background:#ffc400}

.dropZone{border:2px dashed #fff;min-height:70px;margin:15px;padding:10px;width:220px}
.row{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:20px}
.plus{font-size:40px}

button{background:#fff;color:#000;border:none;padding:12px 25px;font-size:18px;margin-top:20px;cursor:pointer}

#endScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column}
</style>
</head>

<body>

<h1>Crack the Nutshell</h1>
<div id="mission">Break the numbers up before your time runs out.</div>

<div class="topBox">
  <div id="levelText"></div>
  <div id="timer">03:00</div>
</div>

<div id="target">0</div>

<div class="blocksWrapper">
  <div id="blueBlocks"></div>
  <div id="yellowBlocks"></div>
</div>

<div class="row">
  <div class="dropZone" id="zoneBlue">Drop blue blocks</div>
  <div class="plus">+</div>
  <div class="dropZone" id="zoneYellow">Drop yellow blocks</div>
</div>

<button onclick="checkAnswer()">Submit Equation</button>

<div id="endScreen">
  <h1 id="endText"></h1>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let levels=[[6,12,10,8,7],[15,24,36,16,21],[15,28,21,13,14]];
let level=0,q=0;
let timerInterval=null,timeLeft=180;
const timerDisplay=document.getElementById("timer");

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=180;
  updateTimer();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0) gameOver(false);
  },1000);
}
function updateTimer(){
  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  timerDisplay.innerText=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function createBlocks(num){
  blueBlocks.innerHTML="";
  yellowBlocks.innerHTML="";
  for(let i=0;i<num;i++){
    let b=document.createElement("div");
    b.className="block blue";
    b.draggable=true;
    b.ondragstart=e=>e.dataTransfer.setData("color","blue");
    blueBlocks.appendChild(b);
  }
  for(let i=0;i<num;i++){
    let y=document.createElement("div");
    y.className="block yellow";
    y.draggable=true;
    y.ondragstart=e=>e.dataTransfer.setData("color","yellow");
    yellowBlocks.appendChild(y);
  }
}

["zoneBlue","zoneYellow"].forEach(id=>{
  let z=document.getElementById(id);
  z.ondragover=e=>e.preventDefault();
  z.ondrop=e=>{
    let color=e.dataTransfer.getData("color");
    let block=document.createElement("div");
    block.className="block "+color;
    z.appendChild(block);
  };
});

function loadQuestion(){
  if(level>=levels.length) return gameOver(true);
  if(q>=levels[level].length){level++;q=0;loadQuestion();return;}

  zoneBlue.innerHTML="Drop blue blocks";
  zoneYellow.innerHTML="Drop yellow blocks";

  levelText.innerText="Level "+(level+1);
  target.innerText=levels[level][q];

  createBlocks(levels[level][q]);
  startTimer();
}

function countBlocks(zone,color){
  return [...zone.children].filter(b=>b.classList.contains(color)).length;
}

function checkAnswer(){
  let blue=countBlocks(zoneBlue,"blue");
  let yellow=countBlocks(zoneYellow,"yellow");

  if(blue+yellow===levels[level][q]){
    q++; loadQuestion();
  }else gameOver(false);
}

function gameOver(win){
  clearInterval(timerInterval);
  endScreen.style.display="flex";
  endText.innerText=win?"YOU WON":"GAME OVER";
}

function restart(){
  level=0;q=0;
  endScreen.style.display="none";
  loadQuestion();
}
loadQuestion();
</script>
</body>
</html>
