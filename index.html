<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crack the Nutshell</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
h1{margin-top:15px;font-size:40px}
#mission{margin:10px;font-size:18px}

.container{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.box{border:2px solid #fff;padding:15px;border-radius:10px;min-width:250px}
#timer{font-size:28px;margin-top:5px}

.operator{border:2px solid #fff;padding:10px;font-size:26px;margin:5px;cursor:grab;display:inline-block}

.blocks{margin-top:20px}
.block{width:40px;height:40px;display:inline-block;margin:5px;border-radius:5px;cursor:grab}
.blue{background:#2b7cff}
.yellow{background:#ffc400}

.dropZone{border:2px dashed #fff;min-height:60px;margin:15px;padding:10px}
#chosenOperator{border:2px dashed #fff;min-height:60px;margin:15px;padding:10px;font-size:30px}

button{background:#fff;color:#000;border:none;padding:12px 25px;font-size:18px;margin-top:20px;cursor:pointer}

#endScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column}
</style>
</head>

<body>

<h1>Crack the Nutshell</h1>
<div id="mission">Break the numbers up before your time runs out.</div>

<div class="container">
  <div class="box">
    <h3>Variables</h3>
    <div id="levelText"></div>
    <div id="questionText"></div>
    <div id="timer">03:00</div>
  </div>

  <div class="box">
    <h3>Drag Operator</h3>
    <div id="operators"></div>
  </div>
</div>

<div class="blocks" id="blocks"></div>

<h3>Build your equation</h3>
<div class="dropZone" id="zoneBlue">Blue Side</div>
<div id="chosenOperator">?</div>
<div class="dropZone" id="zoneYellow">Yellow Side</div>

<button onclick="checkAnswer()">Submit Equation</button>

<div id="endScreen">
  <h1 id="endText"></h1>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let levels=[
{ops:["+"],nums:[6,12,10,8,7]},
{ops:["+","*"],nums:[15,24,36,16,21]},
{ops:["+","*","/"],nums:[15,28,21,13,14]}
];

let level=0,q=0,selectedOp=null;
let timerInterval=null;
let timeLeft=180;
const timerDisplay=document.getElementById("timer");

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=180;
  updateTimerDisplay();

  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){
      clearInterval(timerInterval);
      gameOver(false);
    }
  },1000);
}

function updateTimerDisplay(){
  let minutes=Math.floor(timeLeft/60);
  let seconds=timeLeft%60;
  timerDisplay.innerText=
    String(minutes).padStart(2,"0")+":"+
    String(seconds).padStart(2,"0");
}

function createOperators(){
  operators.innerHTML="";
  levels[level].ops.forEach(op=>{
    let d=document.createElement("div");
    d.className="operator";
    d.innerText=op;
    d.draggable=true;
    d.ondragstart=e=>e.dataTransfer.setData("op",op);
    operators.appendChild(d);
  });
}

chosenOperator.ondragover=e=>e.preventDefault();
chosenOperator.ondrop=e=>{
  selectedOp=e.dataTransfer.getData("op");
  chosenOperator.innerText=selectedOp;
};

function createBlocks(num){
  blocks.innerHTML="";
  for(let i=0;i<num;i++){
    let b=document.createElement("div");
    b.className="block blue";
    b.draggable=true;
    b.ondragstart=e=>e.dataTransfer.setData("color","blue");
    blocks.appendChild(b);

    let y=document.createElement("div");
    y.className="block yellow";
    y.draggable=true;
    y.ondragstart=e=>e.dataTransfer.setData("color","yellow");
    blocks.appendChild(y);
  }
}

["zoneBlue","zoneYellow"].forEach(id=>{
  let z=document.getElementById(id);
  z.ondragover=e=>e.preventDefault();
  z.ondrop=e=>{
    let color=e.dataTransfer.getData("color");
    let block=document.createElement("div");
    block.className="block "+color;
    z.appendChild(block);
  };
});

function loadQuestion(){
  if(level>=levels.length) return gameOver(true);
  if(q>=levels[level].nums.length){level++;q=0;loadQuestion();return;}

  zoneBlue.innerHTML="Blue Side";
  zoneYellow.innerHTML="Yellow Side";
  chosenOperator.innerText="?";
  selectedOp=null;

  levelText.innerText="Level "+(level+1);
  questionText.innerText="Target Number: "+levels[level].nums[q];

  createOperators();
  createBlocks(levels[level].nums[q]);
  startTimer(); // TIMER RESETS EVERY QUESTION
}

function countBlocks(zone,color){
  return [...zone.children].filter(b=>b.classList.contains(color)).length;
}

function checkAnswer(){
  if(!selectedOp) return alert("Drag an operator!");

  let blue=countBlocks(zoneBlue,"blue");
  let yellow=countBlocks(zoneYellow,"yellow");

  let result;
  if(selectedOp=="+") result=blue+yellow;
  if(selectedOp=="*") result=blue*yellow;
  if(selectedOp=="/") result=blue/yellow;

  if(result===levels[level].nums[q]){
    q++; loadQuestion();
  }else gameOver(false);
}

function gameOver(win){
  clearInterval(timerInterval);
  endScreen.style.display="flex";
  endText.innerText=win?"YOU WON":"GAME OVER";
}

function restart(){
  level=0;q=0;
  endScreen.style.display="none";
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
